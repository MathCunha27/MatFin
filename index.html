<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MatFin">
    <meta name="theme-color" content="#0F0F0E">
    <title>MatFin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            background: #0F0F0E;
            color: #E8E4DC;
            font-family: -apple-system, Georgia, serif;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%
        }

        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom)
        }

        input {
            font-size: 16px !important
        }

        ::-webkit-scrollbar {
            display: none
        }

        .mo {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, .75);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .mb {
            background: #1A1918;
            border: 1px solid #2A2928;
            border-radius: 16px;
            padding: 28px;
            max-width: 320px;
            width: 100%;
            text-align: center
        }

        .lock-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0F0F0E;
            padding: 20px
        }

        .lock-box {
            max-width: 340px;
            width: 100%;
            text-align: center
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;
        const SK = "matfin_v3";
        const AK = "matfin_auth";
        const ACCESS_CODE = "MatFin2026";
        const C = { bg: "#0F0F0E", card: "#1A1918", bd: "#2A2928", gold: "#C9A84C", gd: "#8B7A3E", tx: "#E8E4DC", td: "#9B9590", tc: "#D0CBC3", gn: "#5B9A5F", gnB: "#5B9A5F20", rd: "#C75450", rdB: "#C7545020", bl: "#6B9BD2", or: "#D4913B", orB: "#D4913B20", hp: "#8B6CC1", hpB: "#8B6CC120" };
        function ld() { try { const d = JSON.parse(localStorage.getItem(SK)); if (d && d.u) return d } catch (e) { } return { u: [1], d: [], b: {} } }
        function sv(x) { try { localStorage.setItem(SK, JSON.stringify(x)) } catch (e) { } }
        function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]] } return b }

        const QB = {
            1: [
                { q: "Você investiu R$2.000 a 4% ao mês por 5 meses (juros simples). Qual o montante (FV)?", o: ["R$2.400,00", "R$2.433,31", "R$2.800,00", "R$2.040,00"], c: 0, wf: { 1: "Esse valor seria o resultado usando juros COMPOSTOS (FV = PV × (1+i)ⁿ). Neste módulo estamos em juros SIMPLES — a fórmula é multiplicação, não exponenciação.", 2: "Você provavelmente multiplicou errado: 2.000 × 0,4 = 800, depois somou. O erro foi na taxa: 4% = 0,04 (não 0,4). Quando converte porcentagem pra decimal, divide por 100!", 3: "Você calculou os juros de apenas 1 mês (2.000 × 0,04 × 1 = 80) e esqueceu de multiplicar pelo prazo completo de 5 meses. Lembre: o 'n' da fórmula representa TODOS os períodos." }, rf: "FV = PV × (1 + i × n) = 2.000 × (1 + 0,04 × 5) = 2.000 × 1,20 = R$2.400,00", st: "1️⃣ Identificar dados:\n   PV = 2.000 | i = 4% = 0,04 | n = 5 meses\n\n2️⃣ Escolher a fórmula:\n   Quer o montante → FV = PV × (1 + i × n)\n\n3️⃣ Substituir:\n   FV = 2.000 × (1 + 0,04 × 5)\n\n4️⃣ Resolver de dentro pra fora:\n   0,04 × 5 = 0,20\n   1 + 0,20 = 1,20\n   2.000 × 1,20 = 2.400\n\n5️⃣ Resposta: FV = R$ 2.400,00", ht: "A fórmula pede que você multiplique a taxa pelo prazo PRIMEIRO, some 1, e depois multiplique pelo capital. Qual é i × n aqui?", hp: "Na HP 12C (juros simples usa [f] [INT]):\n\n[f] [CLx]           → limpa registros\n2000 [CHS] [PV]     → capital (negativo)\n4 [ENTER] 12 [×] [i] → taxa anual = 48%\n150 [n]             → prazo em dias (5 × 30)\n[f] [INT]           → juros = 400,00\n[+]                 → total = 2.400,00\n\n⚠️ Na HP 12C, juros simples usa:\n• n em DIAS\n• i como taxa ANUAL\n• PV com sinal negativo (convenção)" },
                { q: "Um capital de R$10.000 rendeu R$1.800 de juros simples em 6 meses. Qual a taxa MENSAL?", o: ["3% a.m.", "1,8% a.m.", "18% a.m.", "0,3% a.m."], c: 0, wf: { 1: "Você provavelmente dividiu J por PV direto (1.800 ÷ 10.000 = 0,18 = 18%), mas isso te dá a taxa do PERÍODO TODO (6 meses), não a mensal. Faltou dividir pelo prazo!", 2: "0,18 é a taxa ACUMULADA de 6 meses, não a taxa mensal. Pra achar a mensal, precisa dividir pelo número de meses: 0,18 ÷ 6 = 0,03 = 3% a.m.", 3: "Você provavelmente achou 3% e depois confundiu 0,03 (decimal) com 0,3% (porcentagem). Cuidado: 0,03 em decimal = 3% (multiplica por 100)." }, rf: "i = J/(PV×n) = 1.800/(10.000×6) = 1.800/60.000 = 0,03 = 3% a.m.", st: "1️⃣ Dados: PV=10.000 | J=1.800 | n=6 | i=?\n\n2️⃣ Fórmula (isolando i):\n   J = PV × i × n → i = J / (PV × n)\n\n3️⃣ Substituir:\n   i = 1.800 / (10.000 × 6)\n\n4️⃣ Resolver:\n   10.000 × 6 = 60.000\n   1.800 / 60.000 = 0,03\n\n5️⃣ Converter: 0,03 × 100 = 3%\n\n6️⃣ Resposta: i = 3% a.m.", ht: "Você precisa isolar o 'i'. Se J = PV × i × n, como fica i sozinho? Pense em dividir os dois lados da equação...", hp: "Na HP 12C:\n\n1800 [ENTER]\n10000 [ENTER] 6 [×]\n[÷]\n→ Display: 0,03\n100 [×]\n→ Display: 3,00 (= 3% a.m.)\n\nSequência: J ÷ (PV × n) × 100" },
                { q: "R$100 hoje valem o mesmo que R$100 daqui a 1 ano?", o: ["Não, R$100 hoje valem MAIS", "Sim, R$100 é R$100", "Não, R$100 no futuro valem MAIS", "Depende da inflação apenas"], c: 0, wf: { 1: "Esse é o erro mais comum de quem está começando! Nominalmente (no papel) é o mesmo número, mas o VALOR REAL é diferente. R$100 hoje podem ser investidos e virar R$110 em 1 ano. Então R$100 HOJE = R$110 daqui a 1 ano. Logo, R$100 hoje > R$100 daqui a 1 ano.", 2: "É o contrário! Dinheiro no PRESENTE vale mais porque você tem a OPÇÃO de investir. R$100 hoje → investidos → viram mais que R$100 no futuro.", 3: "Inflação é UM dos fatores, mas não o único. Mesmo com inflação ZERO, R$100 hoje valem mais porque existe o CUSTO DE OPORTUNIDADE — você poderia investir e ganhar juros." }, rf: "R$100 hoje valem mais porque: (1) pode investir e ter mais no futuro, (2) inflação corrói poder de compra, (3) risco de não receber. Este é o princípio #1 da MatFin.", st: "CONCEITO FUNDAMENTAL:\n\nDinheiro hoje > Dinheiro amanhã por 3 razões:\n\n1️⃣ OPORTUNIDADE: R$100 investidos a 10% a.a.\n   → Daqui 1 ano = R$110\n   → Logo, R$100 hoje = R$110 no futuro\n\n2️⃣ INFLAÇÃO: R$100 compram menos coisas com o tempo\n\n3️⃣ RISCO: Pode não receber o dinheiro futuro\n\n💡 Por isso toda a MatFin existe: pra COMPARAR valores em datas diferentes.", ht: "Pense assim: se você tem R$100 hoje e investe a 10%, quanto terá em 1 ano? E se só recebe R$100 daqui a 1 ano, perdeu essa chance...", hp: "Conceitual — mas pra ilustrar na HP:\n\n[f] [CLx]\n100 [CHS] [PV]\n10 [i]\n1 [n]\n[FV]\n→ Display: 110,00\n\n∴ R$100 hoje = R$110 em 1 ano\n   Logo, R$100 hoje > R$100 em 1 ano" },
                { q: "A taxa de juros é 5% a.m. e o prazo é 2 anos. Antes de usar a fórmula, o que você precisa fazer?", o: ["Converter o prazo pra meses: n = 24 meses", "Nada, só aplicar direto", "Converter a taxa pra anual: i = 60% a.a.", "Dividir a taxa por 2"], c: 0, wf: { 1: "Isso daria um resultado completamente errado! Se usar i = 0,05 com n = 2, você estaria calculando juros de 5% por 2 PERÍODOS — mas 2 o quê? A taxa é mensal, o prazo é anual. São unidades diferentes!", 2: "Em juros SIMPLES, converter a taxa (5% × 12 = 60% a.a.) e usar n = 2 anos também funciona. MAS em juros compostos NÃO pode fazer isso. Crie o hábito AGORA de converter o prazo.", 3: "Dividir por 2 não faz sentido aqui. Converta o prazo: 2 anos × 12 = 24 meses." }, rf: "Taxa mensal → prazo em meses: 2 anos × 12 = 24 meses. Agora: i=0,05 e n=24 ✓", st: "REGRA DE OURO:\n\n⚠️ Taxa e prazo SEMPRE na mesma unidade!\n\n1️⃣ Olhe a taxa: 5% a.m. → unidade = MESES\n2️⃣ Olhe o prazo: 2 anos → unidade = ANOS\n3️⃣ Diferentes? SIM → converter\n4️⃣ Converta o PRAZO: 2 × 12 = 24 meses\n5️⃣ Agora pode calcular: i=0,05 | n=24 ✓\n\n💡 MACETE: Sempre converta o prazo, nunca a taxa.", ht: "A regra de ouro diz: taxa e prazo na MESMA unidade. A taxa está em meses. O prazo está em anos. Qual dos dois é mais fácil converter?", hp: "Na HP 12C:\n\n2 [ENTER] 12 [×]\n→ Display: 24,00 (meses)\n\nDepois use:\n24 [n]\n5 [i]\n\nA HP sempre pede n em períodos\ne i por período, na mesma unidade." },
                { q: "R$3.000 aplicados por 8 meses geraram um montante de R$3.720. Qual foi o juro total?", o: ["R$720,00", "R$3.720,00", "R$6.720,00", "R$3.000,00"], c: 0, wf: { 1: "R$3.720 é o MONTANTE (FV), não os juros! O montante é capital + juros. Você confundiu FV com J. J = FV − PV.", 2: "Você SOMOU FV + PV (3.720 + 3.000). Os juros são a DIFERENÇA, não a soma! J = FV − PV (subtração).", 3: "R$3.000 é o CAPITAL INICIAL (PV), não os juros. Os juros são quanto o dinheiro RENDEU além do capital original. J = FV − PV." }, rf: "J = FV − PV = 3.720 − 3.000 = R$720,00. Juros = Montante − Capital. Sempre.", st: "1️⃣ Dados: PV = 3.000 | FV = 3.720 | J = ?\n\n2️⃣ Fórmula: FV = PV + J → J = FV − PV\n\n3️⃣ Calcular: J = 3.720 − 3.000 = R$720,00\n\n💡 Pense assim: você colocou 3.000, tirou 3.720.\nO que sobrou a mais? 720. Esses são os juros.", ht: "Juros é o que o dinheiro RENDEU. Você colocou um valor (PV) e tirou outro maior (FV). A diferença entre esses dois valores é...", hp: "Na HP 12C:\n\n3720 [ENTER] 3000 [−]\n→ Display: 720,00\n\nSimples subtração: FV − PV = J" },
                { q: "Qual a diferença entre PV e FV?", o: ["PV = valor hoje, FV = valor no futuro", "PV = parcela, FV = financiamento", "São a mesma coisa em datas diferentes", "PV = juros, FV = montante"], c: 0, wf: { 1: "PV não é parcela. PV = Present Value = valor no presente. FV = Future Value = valor no futuro. PMT que é parcela.", 2: "Quase! São o MESMO capital em momentos diferentes, mas não 'a mesma coisa' — FV inclui os juros acumulados.", 3: "PV não é juros. PV = capital inicial. FV = capital + juros. Os juros são J = FV − PV." }, rf: "PV (Present Value) = capital no presente. FV (Future Value) = montante no futuro. A diferença entre eles são os juros: J = FV − PV.", st: "PV = Present Value = valor HOJE\nFV = Future Value = valor no FUTURO\nJ = FV − PV (juros = a diferença)\nFV = PV + J (montante = capital + juros)\n\nNa HP 12C, cada uma é uma tecla:\n[PV] [FV] [n] [i] [PMT]", ht: "P vem de 'Present' (presente). F vem de 'Future' (futuro). O que essas palavras significam?", hp: "Na HP 12C, as teclas financeiras:\n\n[PV]  → armazena/calcula valor presente\n[FV]  → armazena/calcula valor futuro\n[n]   → número de períodos\n[i]   → taxa por período\n[PMT] → pagamento periódico\n\nDigite o valor e pressione a tecla\npra armazenar. Pressione sem digitar\nnada pra calcular." },
                { q: "5% ao mês em formato decimal é:", o: ["0,05", "0,5", "5,0", "0,005"], c: 0, wf: { 1: "0,5 = 50%, não 5%. Para converter porcentagem em decimal: divida por 100. 5 ÷ 100 = 0,05.", 2: "5,0 = 500%! Para converter % → decimal: divide por 100. 5 ÷ 100 = 0,05.", 3: "0,005 = 0,5%. Você dividiu por 1.000 em vez de 100. A regra é sempre dividir por 100." }, rf: "5% ÷ 100 = 0,05. Regra: para converter % em decimal, SEMPRE divida por 100.", st: "% → decimal: divide por 100\n\n5% = 5 ÷ 100 = 0,05\n\nOutros exemplos:\n8% = 0,08\n2,5% = 0,025\n0,3% = 0,003\n150% = 1,50\n\n⚠️ Na HP 12C, quando você digita\na taxa na tecla [i], NÃO precisa\nconverter — ela aceita em %!", ht: "Qual operação com o número 100 transforma uma porcentagem em decimal?", hp: "Na HP 12C:\n\n5 [ENTER] 100 [÷]\n→ Display: 0,05\n\nMAS: quando usar a tecla [i],\ndigite 5 direto (não 0,05).\nA HP converte automaticamente!" },
                { q: "R$7.000 aplicados a 2,5% a.m. por 10 meses (juros simples). Qual o montante?", o: ["R$8.750,00", "R$7.175,00", "R$8.925,00", "R$9.100,00"], c: 0, wf: { 1: "Você provavelmente calculou só 1 mês de juros (7.000 × 0,025 = 175). Precisa multiplicar pelo prazo: 0,025 × 10 = 0,25.", 2: "Verifique a multiplicação. i×n = 0,025 × 10 = 0,25. FV = 7.000 × 1,25 = 8.750.", 3: "Confira: i×n = 0,025×10 = 0,25, não 0,30. FV = 7.000 × 1,25 (não 1,30)." }, rf: "FV = 7.000 × (1 + 0,025 × 10) = 7.000 × 1,25 = R$8.750,00", st: "1️⃣ PV=7.000 | i=2,5%=0,025 | n=10\n\n2️⃣ FV = PV × (1 + i × n)\n   FV = 7.000 × (1 + 0,025 × 10)\n\n3️⃣ Dentro dos parênteses:\n   0,025 × 10 = 0,25\n   1 + 0,25 = 1,25\n\n4️⃣ 7.000 × 1,25 = R$ 8.750,00", ht: "Monte a fórmula FV = PV × (1 + i × n). Primeiro resolva o que está dentro dos parênteses: i × n = 0,025 × 10 = ?", hp: "Na HP 12C (juros simples):\n\n[f] [CLx]\n7000 [CHS] [PV]\n2.5 [ENTER] 12 [×] [i]  → 30% a.a.\n300 [n]                  → 10×30 dias\n[f] [INT]                → J = 1.750\n[+]                      → total = 8.750,00" },
                { q: "Se J = PV × i × n, e você quer achar o prazo (n), como isola a fórmula?", o: ["n = J / (PV × i)", "n = PV × i / J", "n = J × PV × i", "n = (PV × i) − J"], c: 0, wf: { 1: "Inverteu! Se J = PV × i × n, dividimos os dois lados por (PV × i): n = J / (PV × i).", 2: "Multiplicar tudo junto dá um número enorme. Isolar uma variável em multiplicação = dividir pelos outros termos.", 3: "Subtração não isola variáveis em multiplicação. Usa divisão: n = J / (PV × i)." }, rf: "J = PV × i × n → n = J / (PV × i). Para isolar uma variável, divide pelos outros termos.", st: "J = PV × i × n\n\nDividindo ambos lados por (PV × i):\nJ / (PV × i) = n\n\n∴ n = J / (PV × i)\n\n💡 Mesma lógica pra isolar qualquer variável:\ni = J / (PV × n)\nPV = J / (i × n)", ht: "Se A = B × C × D, e você quer D sozinho, o que faz com B e C? Pense em 'passar pro outro lado'...", hp: "Exemplo: J=600, PV=5.000, i=0,03\n\nNa HP 12C:\n600 [ENTER]\n5000 [ENTER] 0.03 [×]\n[÷]\n→ Display: 4,00 (= 4 meses)" },
                { q: "R$12.000 renderam R$2.160 de juros a 3% a.m. Por quantos meses ficou aplicado?", o: ["6 meses", "3 meses", "9 meses", "12 meses"], c: 0, wf: { 1: "Se fosse 3 meses: J = 12.000 × 0,03 × 3 = 1.080. Mas os juros foram 2.160, o DOBRO. Logo o prazo é o dobro: 6 meses.", 2: "Se fosse 9 meses: J = 12.000 × 0,03 × 9 = 3.240. Acima de 2.160. Calcule: n = 2.160 / (12.000 × 0,03).", 3: "Se fosse 12 meses: J = 12.000 × 0,03 × 12 = 4.320. Muito acima. n = 2.160 / 360 = 6." }, rf: "n = J/(PV×i) = 2.160/(12.000×0,03) = 2.160/360 = 6 meses.", st: "1️⃣ PV=12.000 | J=2.160 | i=0,03 | n=?\n\n2️⃣ n = J / (PV × i)\n\n3️⃣ Denominador: 12.000 × 0,03 = 360\n\n4️⃣ n = 2.160 / 360 = 6 meses", ht: "Use n = J / (PV × i). Primeiro calcule o denominador: PV × i = 12.000 × 0,03 = ? Depois divida J por esse resultado.", hp: "Na HP 12C:\n\n2160 [ENTER]\n12000 [ENTER] 0.03 [×]\n[÷]\n→ Display: 6,00 (meses)" }
            ], 2: [
                { q: "R$4.000 a juros simples de 6% a.m. por 5 meses. Qual o montante?", o: ["R$5.200,00", "R$4.240,00", "R$5.352,90", "R$4.120,00"], c: 0, wf: { 1: "Você calculou i × n como 0,06 × 1 = 0,06, usando n=1 em vez de n=5. O prazo é 5 meses!", 2: "Esse é o resultado de juros COMPOSTOS: FV = 4.000 × (1,06)⁵. Aqui é juros SIMPLES.", 3: "Verifique: 0,06 × 5 = 0,30, não 0,03. FV = 4.000 × 1,30 = 5.200." }, rf: "FV = 4.000 × (1 + 0,06 × 5) = 4.000 × 1,30 = R$5.200,00", st: "1️⃣ PV=4.000 | i=0,06 | n=5\n2️⃣ FV = 4.000 × (1 + 0,06 × 5)\n3️⃣ 0,06 × 5 = 0,30\n4️⃣ 1 + 0,30 = 1,30\n5️⃣ 4.000 × 1,30 = R$ 5.200,00", ht: "Calcule i × n primeiro: 0,06 × 5 = ? Depois some 1. Depois multiplique pelo PV.", hp: "[f] [CLx]\n4000 [CHS] [PV]\n6 [ENTER] 12 [×] [i] → 72% a.a.\n150 [n]               → 5×30 dias\n[f] [INT] [+]\n→ Display: 5.200,00" },
                { q: "Investimento de R$6.000 a 2% a.m. gerou R$720 de juros simples. Por quantos meses ficou aplicado?", o: ["6 meses", "3 meses", "12 meses", "36 meses"], c: 0, wf: { 1: "Se 3 meses: J = 6.000 × 0,02 × 3 = 360. Juros foram 720 (o dobro) → precisa do dobro do tempo.", 2: "12 meses: J = 6.000 × 0,02 × 12 = 1.440. Muito mais que 720.", 3: "36 meses: J = 6.000 × 0,02 × 36 = 4.320. Muito acima." }, rf: "n = 720/(6.000×0,02) = 720/120 = 6 meses.", st: "1️⃣ PV=6.000 | i=0,02 | J=720 | n=?\n2️⃣ n = J / (PV × i)\n3️⃣ 6.000 × 0,02 = 120\n4️⃣ 720 / 120 = 6 meses", ht: "Isole n: n = J / (PV × i). Quanto é 6.000 × 0,02? Com esse número, divida os juros totais.", hp: "720 [ENTER]\n6000 [ENTER] 0.02 [×]\n[÷]\n→ Display: 6,00 (meses)" },
                { q: "Taxa de 24% ao ano em juros simples. Qual a taxa mensal equivalente?", o: ["2% a.m.", "0,2% a.m.", "24% a.m.", "12% a.m."], c: 0, wf: { 1: "Você dividiu 24 por 120 em vez de 12. Em juros simples, a conversão é proporcional simples: 24% ÷ 12 meses = 2%.", 2: "Não converteu! 24% ao ANO não é a mesma coisa que 24% ao MÊS. Precisa dividir pelos meses.", 3: "24 ÷ 2 = 12? A divisão é por 12 (meses no ano), não por 2." }, rf: "Em juros simples: i mensal = i anual / 12 = 24% / 12 = 2% a.m.", st: "Juros simples → conversão proporcional\ni mensal = i anual / 12\n= 24% / 12\n= 2% a.m.\n\n⚠️ Em juros COMPOSTOS essa conta NÃO funciona!\nLá precisa de taxa equivalente.", ht: "Em juros simples, a conversão é proporcional (divisão simples). Quantos meses tem 1 ano?", hp: "Na HP 12C:\n24 [ENTER] 12 [÷]\n→ Display: 2,00 (% a.m.)\n\nEm juros simples: proporcional.\nEm compostos usaria:\n24 [ENTER] 100 [÷] 1 [+]\n12 [1/x] [yˣ] 1 [-] 100 [×]" },
